<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{% block title %}Dashboard{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="{{ url_for('static', filename='admin_panel.css') }}" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <header class="topbar">
    <button id="sidebarToggle" class="icon-btn" aria-label="Toggle sidebar" aria-expanded="true">
      ☰
    </button>
    <h1 class="app-title">Geneva Web Portal</h1>
  </header>

  <div class="layout">
    <aside id="sidebar" class="sidebar" aria-label="Sidebar Navigation">
  <div class="sidebar-header">
    <img
      src="{{ url_for('static', filename='images/logo-wbg.png') }}"
      alt="Geneva College Logo"
      class="sidebar-logo"
      onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
    />
  </div>

  <nav>
    <a class="nav-item active" href="{{ url_for('dashboard.dashboard_home') }}">Web Portal Home</a>
    <a class="nav-item active" href="{{ url_for('dashboard.dashboard_accounts')}}">Manage Account Details</a>
    <a class="nav-item active" href="{{ url_for('auth.logout') }}">Logout</a>
  </nav>
</aside>

    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="{{ url_for('static', filename='admin_panel.js') }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
