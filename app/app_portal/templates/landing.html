{% extends "admin_panel/base.html" %}

{% block title %}Geneva App Portal{% endblock %}

{% block content %}
<h2 class="section-title">Welcome, {{ current_user.username }}!</h2>

<div class="box-grid" style="display: flex; flex-wrap: wrap; gap: 32px; margin-top: 40px;">
  <a href="{{ url_for('dashboard.dashboard_updates') }}" class="dashboard-box" style="
      background: var(--white);
      border: 2px solid var(--gold);
      padding: 32px;
      border-radius: 10px;
      text-align: center;
      min-width: 240px;
      transition: 0.2s ease;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      display: block;
      flex: 1;
      max-width: 300px;
  ">
    <h4>Alumni Updates</h4>
    <p>View and manage submission data</p>
  </a>

  <a href="{{ url_for('dashboard.dashboard_AlumniClassNotes') }}" class="dashboard-box" style="
      background: var(--white);
      border: 2px solid var(--gold);
      padding: 32px;
      border-radius: 10px;
      text-align: center;
      min-width: 240px;
      transition: 0.2s ease;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      display: block;
      flex: 1;
      max-width: 300px;
  ">
    <h4>Class Notes</h4>
    <p>View and manage submission data</p>
  </a>
</div>
{% endblock %}
