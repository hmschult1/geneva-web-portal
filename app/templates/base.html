<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>{% block title %}Geneva App Portal{% endblock %}</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
  rel="preconnect"
  href="https://fonts.googleapis.com"
/>
<link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin
/>
<link
  href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Roboto+Condensed:wght@500;600;700&display=swap"
  rel="stylesheet"
/>

  <link
    href="{{ url_for('static', filename='admin_panel.css') }}"
    rel="stylesheet"
  />
</head>

<body>
  <header class="portal-header">
    <nav
      class="navbar navbar-expand-lg portal-navbar"
      aria-label="Geneva App Portal navigation"
    >
      <div class="container-fluid portal-navbar-container">

        <!-- Brand -->
        <a
          class="navbar-brand portal-brand"
          href="{{ url_for('dashboard.dashboard_home') }}"
        >
          <img
            src="{{ url_for('static', filename='_assets/logo-wbg.png') }}"
            alt="Geneva College"
            class="portal-logo"
          />

          <span class="portal-title">
            Geneva App Portal
          </span>
        </a>

        <!-- Mobile menu button -->
        <button
          class="navbar-toggler portal-navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#portalNavigation"
          aria-controls="portalNavigation"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navigation links -->
        <div
          class="collapse navbar-collapse"
          id="portalNavigation"
        >
          <ul class="navbar-nav ms-auto align-items-lg-center">

            <li class="nav-item">
              <a
                class="nav-link portal-nav-link
                {% if request.endpoint == 'dashboard.dashboard_home' %}
                  active
                {% endif %}"
                href="{{ url_for('dashboard.dashboard_home') }}"
                {% if request.endpoint == 'dashboard.dashboard_home' %}
                  aria-current="page"
                {% endif %}
              >
                <img
                  src="{{ url_for('static', filename='_assets/home-icon.png') }}"
                  alt=""
                  aria-hidden="true"
                  class="portal-nav-icon"
                />

                <span>App Portal Home</span>
              </a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link portal-nav-link
                {% if request.endpoint == 'dashboard.dashboard_accounts' %}
                  active
                {% endif %}"
                href="{{ url_for('dashboard.dashboard_accounts') }}"
                {% if request.endpoint == 'dashboard.dashboard_accounts' %}
                  aria-current="page"
                {% endif %}
              >
                <img
                  src="{{ url_for('static', filename='_assets/account-icon.png') }}"
                  alt=""
                  aria-hidden="true"
                  class="portal-nav-icon"
                />

                <span>Manage Account</span>
              </a>
            </li>

            <li class="nav-item portal-logout-item">
              <a
                class="nav-link portal-nav-link portal-logout-link"
                href="{{ url_for('auth.logout') }}"
              >
                <img
                  src="{{ url_for('static', filename='_assets/logout-icon.png') }}"
                  alt=""
                  aria-hidden="true"
                  class="portal-nav-icon"
                />

                <span>Logout</span>
              </a>
            </li>

          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="content">
     {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                    <div class="flash-message {{ category }}" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
  ></script>

  <script
    src="{{ url_for('static', filename='admin_panel.js') }}"
  ></script>
</body>
</html>
